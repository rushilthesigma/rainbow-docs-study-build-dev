<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Covalent" />
    <meta name="theme-color" content="#2563EB" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans:wght@400;500;600;700&family=Ubuntu:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      html,body,#root{margin:0;padding:0;min-height:100vh}
      .dark body,.dark #root{background:#0D0D14}
    </style>
    <script>
      // Apply font based on desktop style
      var s=localStorage.getItem('cov-desktop-style')||'macos';
      var fonts={'macos':'Inter','windows':'Noto Sans','chromeos':'Roboto','linux':'Ubuntu'};
      document.documentElement.style.fontFamily=fonts[s]+', system-ui, sans-serif';
    </script>
    <title>Covalent — AI-Powered Learning</title>
  </head>
  <body>
    <script>
      // Apply saved theme immediately to prevent flash
      (function(){var t=localStorage.getItem('covalent-theme');if(t!=='light')document.documentElement.classList.add('dark');})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
